<!DOCTYPE html>

<html>
<head>
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        .container {
            margin-top: 80px;
            animation: fadeIn 2s;
        }
        img {
            width: 150px;
            border-radius: 50%;
            border: 4px solid white;
        }
        h1 {
            margin-top: 20px;
        }
        p {
            font-size: 18px;
        }
        .section {
            margin-top: 40px;
            padding: 20px;
        }
        button {
            background-color: white;
            color: #4facfe;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #ddd;
        }
        a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="profile">
    <h1>Pushpam Kumar</h1>
    <p>I am an MBA student & learning web development 🚀</p>
</div>

<div class="section">
    <h2>About Me</h2>
    <p>
        I am currently pursuing MBA and learning data analytics and web development.
        I want to build my career in tech 🚀
    </p>
</div>

<div class="section">
    <h2>My Skills</h2>
    <p>HTML | CSS | Python | Excel</p>
</div>

<div class="section">
    <h2>Contact Me</h2>
    <p>Email: yourname@gmail.com</p>

```
<a href="mailto:yourname@gmail.com">
    <button>Contact Me</button>
</a>

<p>
    <a href="https://linkedin.com" target="_blank">LinkedIn</a> |
    <a href="https://instagram.com" target="_blank">Instagram</a>
</p>
```

</div>

</body>
</html>
